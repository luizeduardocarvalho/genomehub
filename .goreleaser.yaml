# GoReleaser — cross-compiled release binaries on git tag.
# Local dry run: make release-snapshot   (or: goreleaser release --snapshot --clean)
# Docs: https://goreleaser.com
version: 2

project_name: genomehub

before:
  hooks:
    - go mod tidy

builds:
  - id: genomehub
    main: .
    binary: genomehub
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/luizeduardocarvalho/genomehub/cmd.version={{.Version}}
      - -X github.com/luizeduardocarvalho/genomehub/cmd.commit={{.ShortCommit}}
      - -X github.com/luizeduardocarvalho/genomehub/cmd.date={{.Date}}

archives:
  - id: genomehub
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
